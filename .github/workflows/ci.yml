name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions — read-only unless a specific job needs more
permissions:
  contents: read

# Cancel stale runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: ShellCheck — static analysis at error severity
  # Pinned to ludeeus/action-shellcheck@2.0.0 (not @master — supply-chain safety)
  # SC1090 excluded: can't follow non-constant source — expected in this codebase
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: error
        env:
          SHELLCHECK_OPTS: --exclude=SC1090

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: shfmt — enforce consistent shell formatting
  # 4-space indent, switch case indent, binary ops at line start
  # ─────────────────────────────────────────────────────────────────────────────
  format:
    name: Shell Format (shfmt)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shfmt
        run: |
          SHFMT_VERSION="3.8.0"
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" \
            -o /usr/local/bin/shfmt
          chmod +x /usr/local/bin/shfmt
          shfmt --version

      - name: Check shell formatting
        run: |
          shfmt -i 4 -ci -bn -d \
            dbtools.sh \
            scripts/*.sh \
            install.sh \
            get.sh \
            install-hooks.sh

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Bash syntax check (bash -n on all scripts)
  # ─────────────────────────────────────────────────────────────────────────────
  syntax:
    name: Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check bash syntax
        run: |
          failed=0
          for script in dbtools.sh scripts/*.sh install.sh get.sh install-hooks.sh; do
            if [ -f "$script" ]; then
              printf "Checking %s... " "$script"
              if bash -n "$script"; then
                echo "OK"
              else
                echo "FAIL"
                failed=$((failed + 1))
              fi
            fi
          done
          exit "$failed"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: Conventional commit message validation (PRs only)
  # Validates all commits in the PR against Conventional Commits spec.
  # Not run on direct pushes to main — the commit-msg hook handles that locally.
  # ─────────────────────────────────────────────────────────────────────────────
  commit-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          VALID_TYPES="feat|fix|docs|chore|refactor|test|style|ci|perf|build|revert"
          PATTERN="^(${VALID_TYPES})(\([a-zA-Z0-9_-]+\))?(!)?: .+"

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Checking commits from ${BASE_SHA:0:8}..${HEAD_SHA:0:8}"
          echo ""

          failed=0
          while IFS= read -r commit_line; do
            sha="${commit_line%% *}"
            subject="${commit_line#* }"

            # Skip merge commits (generated by git)
            if echo "$subject" | grep -qE "^Merge "; then
              echo "  ⊘ SKIP  [${sha:0:7}] ${subject}"
              continue
            fi

            if echo "$subject" | grep -qE "$PATTERN"; then
              echo "  ✓ PASS  [${sha:0:7}] ${subject}"
            else
              echo "  ✗ FAIL  [${sha:0:7}] ${subject}"
              failed=$((failed + 1))
            fi
          done < <(git log "${BASE_SHA}..${HEAD_SHA}" --pretty=format:"%H %s")

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "────────────────────────────────────────────────"
            echo "FAILED: ${failed} commit(s) do not follow Conventional Commits"
            echo ""
            echo "Valid types: feat, fix, docs, chore, refactor, test, style, ci, perf, build, revert"
            echo "Format:      <type>[optional scope]: <description>"
            echo ""
            echo "Examples:"
            echo "  feat: add schema-diff command"
            echo "  fix(restore): handle missing SQL file gracefully"
            echo "  ci: pin ludeeus/action-shellcheck to version 2.0.0"
            echo ""
            echo "See: https://www.conventionalcommits.org"
            exit 1
          fi

          echo ""
          echo "All commit messages are valid."

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Secret scanning with gitleaks
  # Scans full git history for accidentally committed credentials.
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 6: Functional tests — no MySQL connection required
  # Calls tests/run-tests.sh — the canonical no-DB test suite shared with the
  # pre-push git hook. This ensures hook and CI can never drift apart.
  # Runs after lint and syntax to fail fast on broken code.
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: No-DB Test Suite
    runs-on: ubuntu-latest
    needs: [lint, syntax]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: |
          chmod +x dbtools.sh
          chmod +x scripts/*.sh

      - name: Run no-DB test suite
        run: bash tests/run-tests.sh "$GITHUB_WORKSPACE"

  # ─────────────────────────────────────────────────────────────────────────────
  # Terminal gate: all jobs must pass before merging.
  # Set THIS as the required status check in branch protection rules.
  # Uses if: always() so it runs even when upstream jobs fail or are skipped.
  # ─────────────────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, format, syntax, commit-lint, security, test]
    if: always()
    steps:
      - name: Check all required jobs passed
        run: |
          lint="${{ needs.lint.result }}"
          format="${{ needs.format.result }}"
          syntax="${{ needs.syntax.result }}"
          security="${{ needs.security.result }}"
          test_result="${{ needs.test.result }}"
          commit_lint="${{ needs.commit-lint.result }}"

          failed=0

          check_job() {
            local name="$1"
            local result="$2"
            # 'skipped' is acceptable — commit-lint only runs on PRs
            if [ "$result" = "success" ] || [ "$result" = "skipped" ]; then
              echo "  ✓ ${name}: ${result}"
            else
              echo "  ✗ ${name}: ${result}"
              failed=$((failed + 1))
            fi
          }

          check_job "lint"        "$lint"
          check_job "format"      "$format"
          check_job "syntax"      "$syntax"
          check_job "security"    "$security"
          check_job "test"        "$test_result"
          check_job "commit-lint" "$commit_lint"

          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "${failed} job(s) failed — CI did not pass"
            exit 1
          fi

          echo ""
          echo "All required CI jobs passed."